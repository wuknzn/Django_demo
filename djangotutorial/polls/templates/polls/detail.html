<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投票 - {{ question.question_text }}</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'polls/style.css' %}">
</head>
<body>
    <div class="vote-container">
        <form action="{% url 'polls:vote' question.id %}" method="post">
            {% csrf_token %}
            <fieldset>
                <legend><h1>{{ question.question_text }}</h1></legend>
                {% if error_message %}<p class="error-message"><strong>{{ error_message }}</strong></p>{% endif %}
                {% for choice in question.choice_set.all %}
                    <div class="choice-item">
                        <input type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}">
                        <label for="choice{{ forloop.counter }}">{{ choice.choice_text }}</label>
                    </div>
                {% endfor %}
            </fieldset>
            <div style="margin: 15px 0;">
                <label for="reason">投票理由（可选）：</label><br>
                <textarea name="reason" id="reason" rows="3" cols="50" placeholder="请输入您的投票理由..."></textarea>
            </div>
            <input type="submit" class="submit-btn" value="提交投票">
        </form>
    </div>
</body>
</html>
