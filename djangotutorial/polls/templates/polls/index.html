<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投票列表</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'polls/style.css' %}">
</head>
<body>
    <div class="vote-container">
        <h1>投票列表</h1>
        
        {% if latest_question_list %}
            <ul class="result-list">
            {% for question in latest_question_list %}
                <li>
                    <a href="{% url 'polls:detail' question.id %}" style="text-decoration: none; color: #1976D2;">{{ question.question_text }}</a>
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <p style="text-align: center; color: #666;">暂无可用的投票。</p>
        {% endif %}
    </div>
</body>
</html>
